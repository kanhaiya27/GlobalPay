services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: globalpay-backend
    ports:
      - "3000:3000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY}
      - EXCHANGE_RATE_API_KEY=${EXCHANGE_RATE_API_KEY}
      - EXCHANGE_RATE_API_URL=${EXCHANGE_RATE_API_URL}
      - PORT=3000
      - NODE_ENV=development
      - CORS_ORIGIN=http://localhost:3000,http://localhost:5173,http://frontend:5173
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    networks:
      - globalpay
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: globalpay-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    networks:
      - globalpay
    depends_on:
      - backend
    restart: unless-stopped

networks:
  globalpay:
    driver: bridge
